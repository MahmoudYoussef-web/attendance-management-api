    <div class="main-area">
      <header class="top-header">
        <div class="header-left">
          <button class="sidebar-toggle sidebar-toggle-mobile"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" x2="21" y1="12" y2="12"/><line x1="3" x2="21" y1="6" y2="6"/><line x1="3" x2="21" y1="18" y2="18"/></svg></button>
          <button class="sidebar-toggle"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" x2="15" y1="3" y2="3"/></svg></button>
          <span class="page-title">Leave Requests</span>
        </div>
        <div class="header-right">
          <div style="position:relative;"><button class="bell-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span class="bell-badge">3</span></button></div>
          <div class="user-avatar">AU</div>
        </div>
      </header>

      <div class="page-content">

        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-md);">
          <div class="tabs" style="margin-bottom:0;">
            <button class="tab active" data-tab="pending" onclick="switchLeaveTab('pending')">Pending (2)</button>
            <button class="tab" data-tab="all" onclick="switchLeaveTab('all')">All Leaves</button>
          </div>
          <button class="btn btn-primary" onclick="openModal('leaveModal')">+ Submit Leave</button>
        </div>

        <div class="card">
          <div class="card-body" style="padding:0;">
            <div class="data-table-wrapper">
              <table class="data-table" id="leavesTable">
                <thead>
                  <tr>
                    <th>Employee</th>
                    <th>Type</th>
                    <th>Start Date</th>
                    <th>End Date</th>
                    <th>Reason</th>
                    <th>Status</th>
                    <th class="cell-actions" style="justify-content:flex-end;">Actions</th>
                  </tr>
                </thead>
                <tbody id="leavesBody" style="display:none"></tbody>
              </table>
            </div>
            <div class="pagination" id="leavePagination">
              <button class="btn-prev" onclick="prevLeavePage()" disabled>&laquo;</button>
              <button class="btn-page active" data-page="0">1</button>
              <button class="btn-next" onclick="nextLeavePage()">&raquo;</button>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- Submit Leave Modal -->
  <div class="modal-overlay" id="leaveModal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">Submit Leave Request</span>
        <button class="modal-close" onclick="closeModal('leaveModal')">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Leave Type</label>
          <select class="form-select">
            <option value="ANNUAL">Annual</option>
            <option value="SICK">Sick</option>
            <option value="EMERGENCY">Emergency</option>
            <option value="UNPAID">Unpaid</option>
          </select>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-md);">
          <div class="form-group">
            <label class="form-label">Start Date</label>
            <input class="form-input" type="date" />
          </div>
          <div class="form-group">
            <label class="form-label">End Date</label>
            <input class="form-input" type="date" />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Reason</label>
          <textarea class="form-textarea" placeholder="Brief description of the reason for leave..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal('leaveModal')">Cancel</button>
        <button class="btn btn-primary" onclick="closeModal('leaveModal');showToast('Leave request submitted','success')">Submit Request</button>
      </div>
    </div>
  </div>

  <!-- Approve/Reject Modal -->
  <div class="modal-overlay" id="approveModal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">Review Leave Request</span>
        <button class="modal-close" onclick="closeModal('approveModal')">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Decision</label>
          <div style="display:flex;gap:var(--space-sm);">
            <button class="btn btn-accent" onclick="closeModal('approveModal');showToast('Leave approved','success')">Approve</button>
            <button class="btn btn-danger" onclick="closeModal('approveModal');showToast('Leave rejected','info')">Reject</button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Comment / Reason</label>
          <textarea class="form-textarea" placeholder="Optional comment..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal('approveModal')">Cancel</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/api/client.js"></script>
  <script src="js/api/auth.js"></script>
  <script>
    var leavesData = [
      { emp: 'Nora Saleem', type: 'ANNUAL', start: 'Jun 25, 2026', end: 'Jun 29, 2026', reason: 'Family vacation', status: 'APPROVED' },
      { emp: 'Khalid Ali', type: 'SICK', start: 'Jul 1, 2026', end: 'Jul 2, 2026', reason: 'Flu', status: 'PENDING' },
      { emp: 'Mona Adel', type: 'ANNUAL', start: 'Jun 28, 2026', end: 'Jun 28, 2026', reason: 'Personal day', status: 'APPROVED' },
      { emp: 'Yusuf Ibrahim', type: 'EMERGENCY', start: 'Jun 30, 2026', end: 'Jun 30, 2026', reason: 'Family emergency', status: 'PENDING' }
    ];

    var leaveStatusMap = {
      'APPROVED': 'approved', 'PENDING': 'pending', 'REJECTED': 'rejected',
      'ANNUAL': 'annual', 'SICK': 'sick', 'EMERGENCY': 'emergency', 'UNPAID': 'unpaid'
    };
    var leaveTypeMap = {
      'ANNUAL': 'annual', 'SICK': 'sick', 'EMERGENCY': 'emergency', 'UNPAID': 'unpaid'
    };

    var reviewingLeaveId = null;

    function renderLeaves(data) {
      var tbody = document.getElementById('leavesBody');
      tbody.style.display = '';
      if (!data || !data.length) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--muted);">No leave requests found</td></tr>';
        return;
      }
      tbody.innerHTML = data.map(function (l) {
        var name = l.employeeName || l.emp || '';
        var type = l.leaveType || l.type || '';
        var start = l.startDate || l.start || '';
        var end = l.endDate || l.end || '';
        var reason = l.reason || '';
        var status = l.status || '';
        var initials = name.split(' ').map(function(p){return p[0]}).join('').slice(0,2).toUpperCase();
        var typeCls = leaveTypeMap[type] || 'pending';
        var statusCls = leaveStatusMap[status] || 'pending';
        return '<tr><td><div class="emp-cell"><span class="emp-avatar">' + initials +
          '</span><div><div class="emp-name">' + escapeHtml(name) + '</div></div></div></td>' +
          '<td><span class="status-badge status-badge--' + typeCls + '">' + type + '</span></td>' +
          '<td>' + start + '</td>' +
          '<td>' + end + '</td>' +
          '<td style="color:var(--muted);font-size:13px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + escapeHtml(reason) + '</td>' +
          '<td><span class="status-badge status-badge--' + statusCls + '">' + status + '</span></td>' +
          '<td class="cell-actions">' +
            (status === 'PENDING'
              ? '<button class="btn btn-sm btn-accent" data-review-leave="' + (l.id || '') + '">Review</button>'
              : '<span style="color:var(--muted);font-size:12px;">—</span>') +
          '</td></tr>';
      }).join('');
      attachLeaveHandlers();
    }

    function attachLeaveHandlers() {
      document.querySelectorAll('[data-review-leave]').forEach(function (btn) {
        btn.onclick = function () {
          reviewingLeaveId = parseInt(this.getAttribute('data-review-leave'));
          document.getElementById('approveModal').querySelector('textarea').value = '';
          window.openModal('approveModal');
        };
      });
    }

    function switchLeaveTab(tab) {
      var tabs = document.querySelectorAll('.tabs .tab');
      tabs.forEach(function(t){t.classList.remove('active')});
      if (tab === 'pending') {
        tabs[0].classList.add('active');
        if (window._apiLeaves) {
          renderLeaves(window._apiLeaves.filter(function(l){return l.status === 'PENDING'}));
        } else {
          renderLeaves(leavesData.filter(function(l){return l.status === 'PENDING'}));
        }
      } else {
        tabs[1].classList.add('active');
        if (window._apiLeaves) {
          renderLeaves(window._apiLeaves);
        } else {
          renderLeaves(leavesData);
        }
      }
    }

    function escapeHtml(str) {
      var d = document.createElement('div');
      d.appendChild(document.createTextNode(str || ''));
      return d.innerHTML;
    }

    // ── API: Submit Leave ──

    (function () {
      var submitBtn = document.querySelector('#leaveModal .btn-primary');
      if (submitBtn) {
        submitBtn.onclick = function () {
          var modal = document.getElementById('leaveModal');
          var select = modal.querySelector('select');
          var dateInputs = modal.querySelectorAll('input[type="date"]');
          var textarea = modal.querySelector('textarea');
          var leaveType = select ? select.value : '';
          var startDate = dateInputs[0] ? dateInputs[0].value : '';
          var endDate = dateInputs[1] ? dateInputs[1].value : '';
          var reason = textarea ? textarea.value.trim() : '';

          if (!leaveType || !startDate || !endDate) {
            showToast('Leave type, start, and end dates are required', 'error');
            return;
          }
          if (endDate < startDate) {
            showToast('End date cannot be before start date', 'error');
            return;
          }

          window.API.post('/api/leaves', { leaveType: leaveType, startDate: startDate, endDate: endDate, reason: reason }).then(function () {
            showToast('Leave request submitted', 'success');
            window.closeModal('leaveModal');
            select.value = '';
            if (dateInputs[0]) dateInputs[0].value = '';
            if (dateInputs[1]) dateInputs[1].value = '';
            if (textarea) textarea.value = '';
            loadLeaves();
          }).catch(function () {});
        };
      }
    })();

    // ── API: Approve / Reject ──

    (function () {
      var approveBtn = document.querySelector('#approveModal .btn-accent');
      var rejectBtn = document.querySelector('#approveModal .btn-danger');
      if (approveBtn) {
        approveBtn.onclick = function () {
          if (!reviewingLeaveId) return;
          window.API.put('/api/leaves/' + reviewingLeaveId + '/review', { action: 'APPROVE' }).then(function () {
            showToast('Leave approved', 'success');
            window.closeModal('approveModal');
            reviewingLeaveId = null;
            loadLeaves();
          }).catch(function () {});
        };
      }
      if (rejectBtn) {
        rejectBtn.onclick = function () {
          if (!reviewingLeaveId) return;
          var reason = document.querySelector('#approveModal textarea').value.trim();
          window.API.put('/api/leaves/' + reviewingLeaveId + '/review', { action: 'REJECT', rejectionReason: reason }).then(function () {
            showToast('Leave rejected', 'info');
            window.closeModal('approveModal');
            reviewingLeaveId = null;
            loadLeaves();
          }).catch(function () {});
        };
      }
    })();

    var leaveCurrentPage = 0;
    var leaveTotalPages = 0;

    function loadLeaves(page) {
      page = page !== undefined ? page : leaveCurrentPage;
      var role = window.AuthAPI ? window.AuthAPI.getRole() : null;
      var endpoint = role === 'EMPLOYEE' ? '/api/leaves/my' : '/api/leaves?page=' + page + '&size=20';
      window.API.get(endpoint).then(function (data) {
        var list = data.content || data;
        if (!Array.isArray(list)) list = [];
        window._apiLeaves = list;
        leaveTotalPages = data.totalPages || 1;
        leaveCurrentPage = data.number || 0;
        updateLeavePagination();
        var pendingTab = document.querySelector('.tabs .tab.active');
        if (pendingTab && pendingTab.getAttribute('data-tab') === 'pending') {
          renderLeaves(list.filter(function(l){return l.status === 'PENDING'}));
        } else {
          renderLeaves(list);
        }
      }).catch(function () {});
    }

    function updateLeavePagination() {
      var prev = document.querySelector('#leavePagination .btn-prev');
      var next = document.querySelector('#leavePagination .btn-next');
      if (prev) prev.disabled = leaveCurrentPage === 0;
      if (next) next.disabled = leaveCurrentPage >= leaveTotalPages - 1;
    }

    function prevLeavePage() { if (leaveCurrentPage > 0) loadLeaves(leaveCurrentPage - 1); }
    function nextLeavePage() { if (leaveCurrentPage < leaveTotalPages - 1) loadLeaves(leaveCurrentPage + 1); }

    // ── Init ──
    (function () {
      if (!window.AuthAPI || !window.AuthAPI.isLoggedIn()) {
        window.location.href = 'login.html';
        return;
      }
      var _role = window.AuthAPI.getRole();
      document.querySelectorAll('.emp-only').forEach(function (el) { el.style.display = _role === 'EMPLOYEE' ? '' : 'none'; });
      document.querySelectorAll('.admin-only').forEach(function (el) { el.style.display = (_role === 'SUPER_ADMIN' || _role === 'HR_MANAGER') ? '' : 'none'; });
      loadLeaves();
    })();

    renderLeaves(leavesData.filter(function(l){return l.status === 'PENDING'}));
  </script>
</body>
</html>
