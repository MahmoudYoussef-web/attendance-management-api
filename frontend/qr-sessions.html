    <div class="main-area">
      <header class="top-header">
        <div class="header-left">
          <button class="sidebar-toggle sidebar-toggle-mobile"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" x2="21" y1="12" y2="12"/><line x1="3" x2="21" y1="6" y2="6"/><line x1="3" x2="21" y1="18" y2="18"/></svg></button>
          <button class="sidebar-toggle"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" x2="15" y1="3" y2="3"/></svg></button>
          <span class="page-title">QR Sessions</span>
        </div>
        <div class="header-right">
          <div style="position:relative;"><button class="bell-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span class="bell-badge">3</span></button></div>

        </div>

      <div class="page-content">

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-lg);">

          <!-- QR Generator -->
          <div class="card">
            <div class="card-header">
              <span class="card-title">Generate QR Session</span>
            </div>
            <div class="card-body">
              <div class="qr-display">
                <div class="qr-box" id="qrBox">
                  <svg width="160" height="160" viewBox="0 0 160 160" id="qrCode">
                    <rect width="160" height="160" fill="#fff"/>
                    <rect x="20" y="20" width="30" height="30" fill="#1E3A5F" rx="3"/>
                    <rect x="55" y="20" width="30" height="30" fill="#1E3A5F" rx="3"/>
                    <rect x="110" y="20" width="30" height="30" fill="#1E3A5F" rx="3"/>
                    <rect x="20" y="55" width="30" height="30" fill="#1E3A5F" rx="3"/>
                    <rect x="90" y="55" width="12" height="12" fill="#1E3A5F" rx="1"/>
                    <rect x="110" y="55" width="12" height="12" fill="#1E3A5F" rx="1"/>
                    <rect x="55" y="90" width="12" height="12" fill="#1E3A5F" rx="1"/>
                    <rect x="72" y="90" width="12" height="12" fill="#0D9488" rx="1"/>
                    <rect x="110" y="72" width="30" height="30" fill="#1E3A5F" rx="3"/>
                    <rect x="20" y="110" width="12" height="12" fill="#1E3A5F" rx="1"/>
                    <rect x="55" y="110" width="12" height="12" fill="#1E3A5F" rx="1"/>
                    <rect x="72" y="110" width="12" height="12" fill="#1E3A5F" rx="1"/>
                    <rect x="90" y="90" width="12" height="12" fill="#1E3A5F" rx="1"/>
                    <rect x="20" y="130" width="30" height="10" fill="#1E3A5F" rx="2"/>
                    <rect x="130" y="20" width="10" height="30" fill="#1E3A5F" rx="2"/>
                    <rect x="55" y="130" width="12" height="12" fill="#1E3A5F" rx="1"/>
                    <rect x="130" y="55" width="10" height="85" fill="#1E3A5F" rx="2"/>
                  </svg>
                </div>
                <div class="qr-timer" id="qrTimer">--:--:--</div>
                <div class="qr-label">Generate a QR session to start</div>
                <div id="sessionInfo" style="display:none;margin-top:var(--space-md);font-size:13px;color:var(--fg);text-align:left;">
                  <div style="display:grid;grid-template-columns:auto 1fr;gap:4px 12px;font-family:var(--font-mono);">
                    <span style="color:var(--muted);">Session</span>
                    <span id="infoSessionId">—</span>
                    <span style="color:var(--muted);">Created</span>
                    <span id="infoCreatedAt">—</span>
                    <span style="color:var(--muted);">Expires</span>
                    <span id="infoExpiresAt">—</span>
                  </div>
                </div>
              </div>
            </div>
            <div class="card-body" style="border-top:1px solid var(--border);display:flex;gap:var(--space-sm);justify-content:center;padding:var(--space-md);">
              <button class="btn btn-accent" id="generateBtn" onclick="startQRSession()">Generate New QR</button>
              <button class="btn btn-danger" onclick="stopQRSession()">Deactivate</button>
            </div>
          </div>

          <!-- Active Sessions History -->
          <div class="card">
            <div class="card-header">
              <span class="card-title">Session History</span>
            </div>
            <div class="card-body" style="padding:0;">
              <div class="data-table-wrapper">
                <table class="data-table">
                  <thead>
                    <tr>
                      <th>Session ID</th>
                      <th>Created</th>
                      <th>Status</th>
                    </tr>
                  </thead>
                  <tbody id="sessionsTbody" style="display:none"></tbody>
                </table>
              </div>
            </div>
          </div>

        </div>

      </div>
    </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="js/app.js"></script>
  <script src="js/api/client.js"></script>
  <script src="js/api/auth.js"></script>
  <script>
    var qrTimer;
    var currentSessionId = null;

    function startQRSession() {
      var btn = document.getElementById('generateBtn');
      btn.disabled = true;
      btn.textContent = 'Generating...';

      window.API.post('/api/attendance/qr/sessions', {}).then(function (data) {
        if (!data) { btn.disabled = false; btn.textContent = 'Generate New QR'; return; }
        btn.disabled = true;
        btn.textContent = 'Active';
        currentSessionId = data.sessionId;
        renderQR(data);
        startTimer(data.expiresAt);
        loadSessions();
        showToast('QR session generated! Employees can now check in', 'success');
      }).catch(function () {
        btn.disabled = false;
        btn.textContent = 'Generate New QR';
      });
    }

    function renderQR(data) {
      var qrBox = document.getElementById('qrBox');
      qrBox.innerHTML = '';
      var qrData = JSON.stringify({ payload: data.qrPayload, signature: data.qrSignature });
      new QRCode(qrBox, {
        text: qrData,
        width: 180,
        height: 180,
        colorDark: '#1E3A5F',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.H
      });
      var label = document.querySelector('.qr-label');
      if (label) label.textContent = 'Session active — scan to check in';
      document.getElementById('sessionInfo').style.display = '';
      document.getElementById('infoSessionId').textContent = data.sessionId || '—';
      document.getElementById('infoCreatedAt').textContent = data.createdAt ? data.createdAt.replace('T', ' ').substring(0, 16) : '—';
      document.getElementById('infoExpiresAt').textContent = data.expiresAt ? data.expiresAt.replace('T', ' ').substring(0, 16) : '—';
    }

    function startTimer(expiresAt) {
      if (qrTimer) clearInterval(qrTimer);
      function tick() {
        var now = new Date().getTime();
        var end = new Date(expiresAt).getTime();
        var diff = Math.max(0, Math.floor((end - now) / 1000));
        if (diff <= 0) {
          document.getElementById('qrTimer').textContent = 'EXPIRED';
          document.getElementById('generateBtn').disabled = false;
          document.getElementById('generateBtn').textContent = 'Generate New QR';
          clearInterval(qrTimer);
          return;
        }
        var h = Math.floor(diff / 3600);
        var m = Math.floor((diff % 3600) / 60);
        var s = diff % 60;
        document.getElementById('qrTimer').textContent =
          (h < 10 ? '0' : '') + h + ':' + (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
      }
      tick();
      qrTimer = setInterval(tick, 1000);
    }

    function loadSessions() {
      window.API.get('/api/attendance/qr/sessions').then(function (data) {
        if (!data) return;
        var list = data.content || data;
        var tbody = document.getElementById('sessionsTbody');
        if (!tbody) return;
        tbody.style.display = '';
        if (!list || !list.length) {
          tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;padding:2rem;color:var(--muted);">No sessions yet</td></tr>';
          return;
        }
        tbody.innerHTML = list.map(function (s) {
          var expired = new Date(s.expiresAt).getTime() < new Date().getTime();
          var statusCls = !s.active ? 'status-badge--muted' : expired ? 'status-badge--muted' : 'status-badge--success';
          var statusText = !s.active ? 'Deactivated' : expired ? 'Expired' : 'Active';
          return '<tr>' +
            '<td style="font-family:var(--font-mono);font-size:12px;">' + escapeHtml(s.sessionId.substring(0, 8)) + '…</td>' +
            '<td>' + (s.createdAt ? s.createdAt.replace('T', ' ').substring(0, 16) : '') + '</td>' +
            '<td><span class="status-badge ' + statusCls + '">' + statusText + '</span></td>' +
            '</tr>';
        }).join('');
      }).catch(function () {});
    }

    function escapeHtml(str) {
      var d = document.createElement('div');
      d.appendChild(document.createTextNode(str || ''));
      return d.innerHTML;
    }

    function stopQRSession() {
      if (!currentSessionId) {
        showToast('No active session', 'info');
        return;
      }
      window.API.del('/api/attendance/qr/sessions/' + currentSessionId).then(function () {
        if (qrTimer) clearInterval(qrTimer);
        document.getElementById('qrTimer').textContent = 'DEACTIVATED';
        currentSessionId = null;
        var qrBox = document.getElementById('qrBox');
        qrBox.innerHTML = '';
        document.getElementById('generateBtn').disabled = false;
        document.getElementById('generateBtn').textContent = 'Generate New QR';
        document.getElementById('sessionInfo').style.display = 'none';
        loadSessions();
        showToast('QR session deactivated', 'info');
      }).catch(function () {});
    }

    // ── Init ──
    (function () {
      if (!window.AuthAPI || !window.AuthAPI.isLoggedIn()) {
        window.location.href = 'login.html';
        return;
      }
      var _role = window.AuthAPI.getRole();
      document.querySelectorAll('.emp-only').forEach(function (el) { el.style.display = _role === 'EMPLOYEE' ? '' : 'none'; });
      document.querySelectorAll('.admin-only').forEach(function (el) { el.style.display = (_role === 'SUPER_ADMIN' || _role === 'HR_MANAGER') ? '' : 'none'; });
      loadSessions();
    })();
  </script>
</body>
