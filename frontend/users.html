      <div class="page-content">

            <div class="data-table-wrapper">

                <thead><tr><th>Email</th><th>Role</th><th>Status</th><th class="cell-actions" style="justify-content:flex-end;">Actions</th></tr></thead>

  <!-- Edit User Modal -->
  <div class="modal-overlay" id="userModal">
    <div class="modal">
      <div class="modal-header"><span class="modal-title">Edit User</span><button class="modal-close" onclick="closeModal('userModal')">&times;</button></div>
      <div class="modal-body">
        <div class="form-group"><label class="form-label">Email</label><input class="form-input" type="email" /></div>
        <div class="form-group"><label class="form-label">Role</label>
          <select class="form-select">
            <option value="SUPER_ADMIN">Super Admin</option>
            <option value="HR_MANAGER">HR Manager</option>
            <option value="EMPLOYEE">Employee</option>
          </select>
        </div>
        <div style="display:flex;gap:var(--space-lg);">
          <label class="form-label" style="display:flex;align-items:center;gap:var(--space-sm);cursor:pointer;">
            <input type="checkbox" id="userEnabled" checked /> Enabled
          </label>
          <label class="form-label" style="display:flex;align-items:center;gap:var(--space-sm);cursor:pointer;">
            <input type="checkbox" id="userLocked" /> Locked
          </label>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal('userModal')">Cancel</button>
        <button class="btn btn-primary">Save</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/api/client.js"></script>
  <script src="js/api/auth.js"></script>
  <script>
    (function () {
      if (!window.AuthAPI || !window.AuthAPI.isLoggedIn()) {
        window.location.href = 'login.html';
        return;
      }

      var _role = window.AuthAPI.getRole();
      document.querySelectorAll('.emp-only').forEach(function (el) { el.style.display = _role === 'EMPLOYEE' ? '' : 'none'; });
      document.querySelectorAll('.admin-only').forEach(function (el) { el.style.display = (_role === 'SUPER_ADMIN' || _role === 'HR_MANAGER') ? '' : 'none'; });

      var editingUserId = null;

      function loadUsers() {
        window.API.get('/api/users').then(function (data) {
          if (!data) return;
          var list = data.content || data;
          var tbody = document.getElementById('userTableBody');
          if (!tbody) return;
          tbody.style.display = '';
          if (!list || !list.length) {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;padding:2rem;color:var(--muted);">No users found</td></tr>';
            return;
          }
          tbody.innerHTML = list.map(function (u) {
            var statusColor = !u.enabled ? 'var(--danger)' : u.locked ? 'var(--warning)' : 'var(--success)';
            var statusText = !u.enabled ? 'Disabled' : u.locked ? 'Locked' : 'Active';
            return '<tr>' +
              '<td>' + escapeHtml(u.email) + '</td>' +
              '<td><span class="badge badge-' + (u.role === 'SUPER_ADMIN' ? 'accent' : u.role === 'HR_MANAGER' ? 'primary' : 'ghost') + '">' + u.role + '</span></td>' +
              '<td><span style="color:' + statusColor + ';">' + statusText + '</span></td>' +
              '<td class="cell-actions">' +
                '<button class="btn btn-sm btn-ghost" data-edit-user="' + u.id + '">Edit</button>' +
                '<button class="btn btn-sm btn-ghost" style="color:var(--danger);" data-delete-user="' + u.id + '">Delete</button>' +
              '</td></tr>';
          }).join('');
          attachUserHandlers();
        }).catch(function () {});
      }

      function attachUserHandlers() {
        document.querySelectorAll('[data-edit-user]').forEach(function (btn) {
          btn.onclick = function () {
            var id = parseInt(this.getAttribute('data-edit-user'));
            editingUserId = id;
            window.API.get('/api/users/' + id).then(function (u) {
              if (!u) return;
              var modal = document.getElementById('userModal');
              modal.querySelector('.modal-title').textContent = 'Edit User';
              modal.querySelector('input[type="email"]').value = u.email || '';
              modal.querySelector('select').value = u.role || 'EMPLOYEE';
              document.getElementById('userEnabled').checked = u.enabled !== false;
              document.getElementById('userLocked').checked = u.locked === true;
              modal.querySelector('.btn-primary').textContent = 'Update';
              window.openModal('userModal');
            });
          };
        });
        document.querySelectorAll('[data-delete-user]').forEach(function (btn) {
          btn.onclick = function () {
            var id = parseInt(this.getAttribute('data-delete-user'));
            if (confirm('Delete this user? This action cannot be undone.')) {
              window.API.del('/api/users/' + id).then(function () {
                showToast('User deleted', 'success');
                loadUsers();
              }).catch(function () {});
            }
          };
        });
      }

      var userSaveBtn = document.querySelector('#userModal .btn-primary');
      if (userSaveBtn) {
        userSaveBtn.onclick = function () {
          var modal = document.getElementById('userModal');
          var email = modal.querySelector('input[type="email"]').value.trim();
          var role = modal.querySelector('select').value;
          var enabled = document.getElementById('userEnabled').checked;
          var locked = document.getElementById('userLocked').checked;
          if (!email) { showToast('Email is required', 'error'); return; }
          var body = { email: email, role: role, enabled: enabled, locked: locked };
          if (!editingUserId) {
            showToast('Use Employees page to create new users', 'info');
            return;
          }
          window.API.put('/api/users/' + editingUserId, body).then(function () {
            showToast('User updated', 'success');
            window.closeModal('userModal');
            editingUserId = null;
            modal.querySelector('.modal-title').textContent = 'Edit User';
            loadUsers();
          }).catch(function () {});
        };
      }

      function escapeHtml(str) {
        var d = document.createElement('div');
        d.appendChild(document.createTextNode(str || ''));
        return d.innerHTML;
      }

      loadUsers();
    })();
  </script>
