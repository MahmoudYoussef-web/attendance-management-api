      <div class="page-content" style="max-width:480px;margin:0 auto;">
        <div class="card">
          <div class="card-header"><span class="card-title">Scan QR Code</span></div>
          <div class="card-body" style="text-align:center;">
            <video id="scanner" style="width:100%;max-width:360px;border-radius:var(--radius-sm);background:#000;"></video>
            <canvas id="qrCanvas" style="display:none;"></canvas>
            <div id="scanStatus" style="margin-top:var(--space-md);color:var(--muted);font-size:14px;">Press Start Camera to begin</div>
            <div style="margin-top:var(--space-lg);display:flex;gap:var(--space-sm);justify-content:center;">
              <button class="btn btn-accent" id="startBtn" onclick="startCamera()">Start Camera</button>
              <button class="btn btn-ghost" id="stopBtn" onclick="stopCamera()" disabled>Stop Camera</button>
            </div>
          </div>
        </div>
      </div>
    </div>

  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <script src="js/app.js"></script>
  <script src="js/api/client.js"></script>
  <script src="js/api/auth.js"></script>
  <script>
    (function () {
      if (!window.AuthAPI || !window.AuthAPI.isLoggedIn()) {
        window.location.href = 'login.html';
        return;
      }
      var role = window.AuthAPI.getRole();
      document.querySelectorAll('.admin-only').forEach(function (el) {
        el.style.display = (role === 'SUPER_ADMIN' || role === 'HR_MANAGER') ? '' : 'none';
      });
      document.querySelectorAll('.emp-only').forEach(function (el) {
        el.style.display = (role === 'EMPLOYEE') ? '' : 'none';
      });
    })();

    var stream = null;
    var scanTimer = null;

    function startCamera() {
      var status = document.getElementById('scanStatus');
      navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } }).then(function (s) {
        stream = s;
        document.getElementById('scanner').srcObject = s;
        document.getElementById('startBtn').disabled = true;
        document.getElementById('stopBtn').disabled = false;
        status.textContent = 'Scanning for QR code...';
        status.style.color = 'var(--success)';
        startScanning();
      }).catch(function () {
        status.textContent = 'Camera access denied. Grant camera permission and try again.';
        status.style.color = 'var(--danger)';
      });
    }

    function stopCamera() {
      if (scanTimer) { clearInterval(scanTimer); scanTimer = null; }
      if (stream) { stream.getTracks().forEach(function (t) { t.stop(); }); stream = null; }
      document.getElementById('scanner').srcObject = null;
      document.getElementById('startBtn').disabled = false;
      document.getElementById('stopBtn').disabled = true;
      document.getElementById('scanStatus').textContent = 'Camera stopped';
      document.getElementById('scanStatus').style.color = 'var(--muted)';
    }

    function startScanning() {
      var video = document.getElementById('scanner');
      var canvas = document.getElementById('qrCanvas');
      var ctx = canvas.getContext('2d');
      var status = document.getElementById('scanStatus');

      scanTimer = setInterval(function () {
        if (!stream || stream.getTracks().some(function (t) { return !t.enabled || t.readyState !== 'live'; })) {
          stopCamera();
          return;
        }
        if (video.readyState !== 4) return;
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        var imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        var code = jsQR(imageData.data, imageData.width, imageData.height);
        if (code) {
          clearInterval(scanTimer);
          stopCamera();
          try {
            var parsed = JSON.parse(code.data);
            if (!parsed.payload || !parsed.signature) {
              status.textContent = 'Invalid QR code format';
              status.style.color = 'var(--danger)';
              return;
            }
            status.textContent = 'QR detected! Checking in...';
            status.style.color = 'var(--info)';
            window.API.post('/api/attendance/check-in', {
              qrPayload: parsed.payload,
              qrSignature: parsed.signature
            }).then(function (res) {
              status.textContent = 'Check-in successful!';
              status.style.color = 'var(--success)';
              showToast('Check-in successful!', 'success');
            }).catch(function () {
              status.textContent = 'Check-in failed. Try again.';
              status.style.color = 'var(--danger)';
            });
          } catch (e) {
            status.textContent = 'Invalid QR data format';
            status.style.color = 'var(--danger)';
          }
        }
      }, 300);
    }
  </script>
