    <div class="main-area">
      <header class="top-header">
        <div class="header-left">
          <button class="sidebar-toggle sidebar-toggle-mobile"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" x2="21" y1="12" y2="12"/><line x1="3" x2="21" y1="6" y2="6"/><line x1="3" x2="21" y1="18" y2="18"/></svg></button>
          <button class="sidebar-toggle"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" x2="15" y1="3" y2="3"/></svg></button>
          <span class="page-title">Attendance History</span>
        </div>
        <div class="header-right">
          <div style="position:relative;"><button class="bell-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span class="bell-badge">3</span></button></div>
          <div class="user-avatar">AU</div>
        </div>
      </header>

      <div class="page-content">

        <div class="tabs">
          <button class="tab active" data-tab="today" onclick="switchTab('today')">Today</button>
          <button class="tab" data-tab="history" onclick="switchTab('history')">History</button>
        </div>

        <div class="filters-bar">
          <input class="filter-date" type="date" id="fromDate" value="2026-06-01" />
          <span style="color:var(--muted);font-size:13px;">to</span>
          <input class="filter-date" type="date" id="toDate" value="2026-06-28" />
          <select class="filter-select" id="attendanceFilter" onchange="filterAttendance()">
            <option value="">All Employees</option>
            <option value="Sarah Ahmed">Sarah Ahmed</option>
            <option value="Omar Hassan">Omar Hassan</option>
            <option value="Lina Khalid">Lina Khalid</option>
            <option value="Khalid Ali">Khalid Ali</option>
          </select>
          <button class="btn btn-sm btn-ghost" onclick="showToast('Filters applied','success')">Apply</button>
        </div>

        <div class="card">
          <div class="card-body" style="padding:0;">
            <div class="data-table-wrapper">
              <table class="data-table" id="attendanceTable">
                <thead>
                  <tr>
                    <th>Employee</th>
                    <th>Date</th>
                    <th>Check-in Time</th>
                    <th>Status</th>
                    <th>Notes</th>
                  </tr>
                </thead>
                <tbody id="attendanceBody" style="display:none">
                </tbody>
              </table>
            </div>
          </div>
          <div class="pagination" id="attPagination">
            <button class="btn-prev" onclick="prevPage()" disabled>&laquo;</button>
            <button class="btn-page active" data-page="0">1</button>
            <button class="btn-next" onclick="nextPage()">&raquo;</button>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/api/client.js"></script>
  <script src="js/api/auth.js"></script>
  <script>
    var attendanceData = [
      { emp: 'Sarah Ahmed', date: 'Jun 28, 2026', checkIn: '08:55', status: 'PRESENT', notes: '—' },
      { emp: 'Omar Hassan', date: 'Jun 28, 2026', checkIn: '09:12', status: 'LATE', notes: 'Traffic' },
      { emp: 'Lina Khalid', date: 'Jun 28, 2026', checkIn: '08:48', status: 'PRESENT', notes: '—' },
      { emp: 'Khalid Ali', date: 'Jun 28, 2026', checkIn: '10:05', status: 'LATE', notes: 'Overslept' },
      { emp: 'Nora Saleem', date: 'Jun 28, 2026', checkIn: '08:58', status: 'PRESENT', notes: '—' },
      { emp: 'Faisal Omar', date: 'Jun 28, 2026', checkIn: '—', status: 'ABSENT', notes: 'No show' },
      { emp: 'Mona Adel', date: 'Jun 28, 2026', checkIn: '—', status: 'ON_LEAVE', notes: 'Annual leave' },
      { emp: 'Yusuf Ibrahim', date: 'Jun 28, 2026', checkIn: '10:22', status: 'LATE', notes: 'Appointment' },
      { emp: 'Sarah Ahmed', date: 'Jun 27, 2026', checkIn: '08:50', status: 'PRESENT', notes: '—' },
      { emp: 'Omar Hassan', date: 'Jun 27, 2026', checkIn: '09:05', status: 'LATE', notes: '—' },
      { emp: 'Lina Khalid', date: 'Jun 27, 2026', checkIn: '08:45', status: 'PRESENT', notes: '—' },
      { emp: 'Nora Saleem', date: 'Jun 27, 2026', checkIn: '—', status: 'ON_LEAVE', notes: 'Annual leave' }
    ];

    var statusMap = {
      'PRESENT': 'present', 'ABSENT': 'absent', 'LATE': 'late', 'HALF_DAY': 'half-day', 'ON_LEAVE': 'on-leave'
    };

    var currentTab = 'today';
    var currentPage = 0;
    var totalPages = 0;
    var PAGE_SIZE = 20;

    function renderAttendance(data) {
      var tbody = document.getElementById('attendanceBody');
      tbody.style.display = '';
      if (!data || !data.length) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:var(--space-xl);">No records found</td></tr>';
        return;
      }
      tbody.innerHTML = data.map(function (r) {
        var name = r.employeeName || r.emp || '';
        var date = r.attendanceDate || r.date || '';
        var checkIn = r.checkInTime ? formatTime(r.checkInTime) : (r.checkIn || '—');
        var status = r.status || '';
        var notes = r.notes || '—';
        var initials = name.split(' ').map(function(p){return p[0]}).join('').slice(0,2).toUpperCase();
        var cls = statusMap[status] || 'present';
        return '<tr><td><div class="emp-cell"><span class="emp-avatar">' + initials +
          '</span><div><div class="emp-name">' + escapeHtml(name) + '</div></div></div></td>' +
          '<td>' + date + '</td>' +
          '<td>' + checkIn + '</td>' +
          '<td><span class="status-badge status-badge--' + cls + '">' + status.replace('_', ' ') + '</span></td>' +
          '<td style="color:var(--muted);font-size:13px;">' + escapeHtml(notes) + '</td></tr>';
      }).join('');
    }

    function formatTime(isoStr) {
      if (!isoStr) return '—';
      var parts = isoStr.split('T');
      if (parts.length < 2) return isoStr;
      return parts[1].substring(0, 5);
    }

    function switchTab(tab) {
      currentTab = tab;
      var tabs = document.querySelectorAll('.tab');
      tabs.forEach(function(t){t.classList.remove('active')});
      if (tab === 'today') {
        tabs[0].classList.add('active');
        loadToday();
      } else {
        tabs[1].classList.add('active');
        loadHistory();
      }
    }

    function filterAttendance() {
      var emp = document.getElementById('attendanceFilter').value;
      if (currentTab === 'history') {
        loadHistory(emp);
      } else {
        loadToday();
      }
    }

    function loadToday() {
      window.API.get('/api/attendance/today').then(function (data) {
        if (!data) return;
        renderAttendance(data.content || data);
        updatePagination({ totalPages: 1, number: 0 });
      }).catch(function () {});
    }

    function loadHistory(employeeId, page) {
      page = page !== undefined ? page : currentPage;
      var path = '/api/attendance?page=' + page + '&size=' + PAGE_SIZE;
      if (employeeId) path += '&employeeId=' + employeeId;
      window.API.get(path).then(function (data) {
        if (!data) return;
        var list = data.content || data;
        if (!Array.isArray(list)) list = [];
        renderAttendance(list);
        updatePagination(data);
      }).catch(function () {});
    }

    function updatePagination(pageData) {
      totalPages = pageData.totalPages || 0;
      currentPage = pageData.number || 0;
      document.querySelectorAll('#attPagination .btn-page').forEach(function (btn) {
        var p = parseInt(btn.getAttribute('data-page'));
        if (!isNaN(p)) btn.classList.toggle('active', p === currentPage);
      });
      var prev = document.querySelector('#attPagination .btn-prev');
      var next = document.querySelector('#attPagination .btn-next');
      if (prev) prev.disabled = currentPage === 0;
      if (next) next.disabled = currentPage >= totalPages - 1;
    }

    function prevPage() { if (currentPage > 0 && currentTab === 'history') loadHistory(document.getElementById('attendanceFilter').value, currentPage - 1); }
    function nextPage() { if (currentPage < totalPages - 1 && currentTab === 'history') loadHistory(document.getElementById('attendanceFilter').value, currentPage + 1); }

    function loadEmployees() {
      window.API.get('/api/employees').then(function (data) {
        var list = data.content || data;
        if (!Array.isArray(list)) return;
        var select = document.getElementById('attendanceFilter');
        select.innerHTML = '<option value="">All Employees</option>' +
          list.map(function (e) {
            var name = (e.firstName && e.lastName) ? e.firstName + ' ' + e.lastName : '';
            return '<option value="' + (e.id || '') + '">' + escapeHtml(name) + '</option>';
          }).join('');
      }).catch(function () {});
    }

    function escapeHtml(str) {
      var d = document.createElement('div');
      d.appendChild(document.createTextNode(str || ''));
      return d.innerHTML;
    }

    // ── Init ──
    (function () {
      if (!window.AuthAPI || !window.AuthAPI.isLoggedIn()) {
        window.location.href = 'login.html';
        return;
      }
      var _role = window.AuthAPI.getRole();
      document.querySelectorAll('.emp-only').forEach(function (el) { el.style.display = _role === 'EMPLOYEE' ? '' : 'none'; });
      document.querySelectorAll('.admin-only').forEach(function (el) { el.style.display = (_role === 'SUPER_ADMIN' || _role === 'HR_MANAGER') ? '' : 'none'; });
      loadToday();
      loadEmployees();
    })();
  </script>
</body>
